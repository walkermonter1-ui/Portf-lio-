<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>BCM Taxi - Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://st.depositphotos.com/1000816/2291/i/950/depositphotos_22911280-stock-photo-business-team-formed-of-young.jpg') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* overlay escuro */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

/* container */
.box {
    position: relative;
    background: rgba(10,10,10,0.9);
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
    box-shadow: 0 0 20px red;
}

h1 {
    color: red;
    text-shadow: 0 0 10px red;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
    background: black;
    color: red;
    box-shadow: 0 0 5px red inset;
}

button {
    width: 100%;
    padding: 10px;
    background: black;
    color: red;
    border: 1px solid red;
    cursor: pointer;
}

button:hover {
    background: red;
    color: black;
}

.link {
    margin-top: 10px;
    color: #aaa;
    cursor: pointer;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="box">

<div id="login">
<h1>BCM Taxi</h1>
<input type="email" id="email" placeholder="Email">
<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div class="link" onclick="showRegister()">Criar conta</div>
<div class="link" onclick="showForgot()">Esqueceu a senha?</div>
</div>

<div id="register" class="hidden">
<h1>Registrar</h1>
<input type="email" id="newEmail" placeholder="Email">
<input type="password" id="newSenha" placeholder="Senha">
<button onclick="register()">Criar Conta</button>
<div class="link" onclick="showLogin()">Voltar</div>
</div>

<div id="forgot" class="hidden">
<h1>Recuperar</h1>
<input type="email" placeholder="Digite seu email">
<button onclick="alert('Link enviado (simulação)')">Enviar</button>
<div class="link" onclick="showLogin()">Voltar</div>
</div>

</div>

<script>
function showRegister() {
    login.classList.add("hidden");
    register.classList.remove("hidden");
}

function showLogin() {
    login.classList.remove("hidden");
    register.classList.add("hidden");
    forgot.classList.add("hidden");
}

function showForgot() {
    login.classList.add("hidden");
    forgot.classList.remove("hidden");
}

function register() {
    localStorage.setItem("user", newEmail.value);
    localStorage.setItem("pass", newSenha.value);
    alert("Conta criada!");
    showLogin();
}

function login() {
    let email = document.getElementById("email").value;
    let senha = document.getElementById("senha").value;

    if (email === "walkermonter1@gmail.com" && senha === "bcm123") {
        window.location.href = "main.html";
        return;
    }

    if (email === localStorage.getItem("user") &&
        senha === localStorage.getItem("pass")) {
        window.location.href = "main.html";
    } else {
        alert("Acesso negado!");
    }
}
</script>

</body>
</html>
