<!DOCTYPE html>
<html>
<head>
  <title>Login Firebase Google</title>
</head>
<body>

<h2>Login com Google</h2>
<button onclick="googleLogin()">Entrar com Google</button>

<h3>Usuários (Tempo Real)</h3>
<ul id="lista"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics.js";

import { 
  getAuth, 
  GoogleAuthProvider, 
  signInWithPopup 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import { 
  getDatabase, 
  ref, 
  set, 
  onValue 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

// 🔥 TUA CONFIG (já pronta)
const firebaseConfig = {
  apiKey: "AIzaSyAqEpWDNTzWnS336_gp4tadr30vJg53iQE",
  authDomain: "oidev-f0134.firebaseapp.com",
  databaseURL: "https://oidev-f0134-default-rtdb.firebaseio.com",
  projectId: "oidev-f0134",
  storageBucket: "oidev-f0134.firebasestorage.app",
  messagingSenderId: "33736102165",
  appId: "1:33736102165:web:e9e6ea5a833a72c831d91c",
  measurementId: "G-J6W2QX0LC9"
};

// INICIAR
const app = initializeApp(firebaseConfig);
getAnalytics(app);

const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = getDatabase(app);

// 🔐 LOGIN GOOGLE
window.googleLogin = async () => {
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    // SALVAR NO DATABASE
    await set(ref(db, "users/" + user.uid), {
      nome: user.displayName,
      email: user.email,
      foto: user.photoURL,
      ultimoLogin: new Date().toISOString()
    });

    alert("Login feito com sucesso!");
  } catch (e) {
    alert(e.message);
  }
};

// 👀 VER DADOS EM TEMPO REAL
const lista = document.getElementById("lista");

onValue(ref(db, "users/"), (snapshot) => {
  lista.innerHTML = "";

  const data = snapshot.val();
  if (!data) return;

  for (let id in data) {
    const li = document.createElement("li");
    li.innerText = data[id].nome + " | " + data[id].email;
    lista.appendChild(li);
  }
});
</script>

</body>
</html>
