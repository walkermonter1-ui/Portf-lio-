<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>BCM Taxi</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

/* topo */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #111;
    box-shadow: 0 0 10px red;
}

.logout {
    cursor: pointer;
    color: red;
}

/* mapa */
#map {
    width: 100%;
    height: 50vh;
}

/* conteúdo */
.container {
    padding: 15px;
}

input {
    width: 100%;
    padding: 10px;
    border: none;
    margin-bottom: 10px;
    background: #111;
    color: red;
}

button {
    width: 100%;
    padding: 15px;
    background: black;
    border: 1px solid red;
    color: red;
    cursor: pointer;
}

button:hover {
    background: red;
    color: black;
}

#status {
    margin-top: 10px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="header">
    <h3>BCM Taxi</h3>
    <div class="logout" onclick="logout()">Sair</div>
</div>

<div id="map"></div>

<div class="container">
    <input type="text" placeholder="Pesquisar motorista por ID">
    <button onclick="buscarMotorista()">Agendar Viagem</button>
    <div id="status"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map;

/* Inicializar mapa */
function initMap(lat, lng) {
    map = L.map('map').setView([lat, lng], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    L.marker([lat, lng]).addTo(map)
        .bindPopup("📍 Você está aqui")
        .openPopup();
}

/* GPS */
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                initMap(pos.coords.latitude, pos.coords.longitude);
            },
            () => {
                alert("Ative o GPS!");
            }
        );
    } else {
        alert("GPS não suportado");
    }
}

/* Simulação */
function buscarMotorista() {
    let status = document.getElementById("status");

    status.innerText = "🔍 Procurando motorista perto da sua localização...";

    setTimeout(() => {
        status.innerText = "📡 Encontrando motoristas próximos...";
    }, 2000);

    setTimeout(() => {
        status.innerText = "🚕 Motorista encontrado! Chegando em 5 minutos.";
    }, 4000);
}

/* Logout */
function logout() {
    window.location.href = "index.html";
}

/* Iniciar */
getLocation();
</script>

</body>
</html>
