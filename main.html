<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>BCM Taxi</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: #111;
    box-shadow: 0 0 10px red;
}

.logout {
    cursor: pointer;
    color: red;
}

#map {
    width: 100%;
    height: 50vh;
}

.container {
    padding: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #111;
    color: red;
    border: none;
}

button {
    width: 100%;
    padding: 15px;
    background: black;
    border: 1px solid red;
    color: red;
}

#status {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
    <h3>BCM Taxi</h3>
    <div class="logout" onclick="logout()">Sair</div>
</div>

<div id="map"></div>

<div class="container">
    <input type="text" placeholder="Pesquisar motorista por ID">
    <button onclick="buscarMotorista()">Agendar Viagem</button>
    <div id="status">Aguardando GPS...</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map;

/* iniciar mapa */
function initMap(lat, lng) {
    document.getElementById("status").innerText = "📍 Localização detectada";

    map = L.map('map').setView([lat, lng], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    L.marker([lat, lng]).addTo(map)
        .bindPopup("Você está aqui")
        .openPopup();
}

/* erro */
function erroGPS(e) {
    console.log(e);
    document.getElementById("status").innerText = "❌ Erro ao obter GPS";

    // fallback (Luanda)
    initMap(-8.8383, 13.2344);
}

/* obter localização */
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                initMap(pos.coords.latitude, pos.coords.longitude);
            },
            erroGPS,
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    } else {
        erroGPS();
    }
}

/* simulação */
function buscarMotorista() {
    let status = document.getElementById("status");

    status.innerText = "🔍 Procurando motorista...";

    setTimeout(() => {
        status.innerText = "📡 Encontrando...";
    }, 2000);

    setTimeout(() => {
        status.innerText = "🚕 Motorista encontrado!";
    }, 4000);
}

/* sair */
function logout() {
    window.location.href = "index.html";
}

/* iniciar */
window.onload = getLocation;
</script>

</body>
</html>
