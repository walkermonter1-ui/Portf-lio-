<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>BCM Taxi</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url('https://4kwallpapers.com/images/walls/thumbs_3t/2288.png') no-repeat center center/cover;
    color: white;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    z-index: -1;
}

/* header */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 15px red;
}

.logout {
    cursor: pointer;
    color: red;
    transition: 0.3s;
}

.logout:hover {
    text-shadow: 0 0 10px red;
}

/* mapa */
#map {
    width: 100%;
    height: 50vh;
    border-bottom: 1px solid red;
}

/* container */
.container {
    padding: 15px;
}

/* input */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    background: rgba(0,0,0,0.7);
    color: red;
    border: 1px solid red;
    border-radius: 5px;
}

/* botão */
button {
    width: 100%;
    padding: 15px;
    background: black;
    border: 1px solid red;
    color: red;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

button:hover {
    background: red;
    color: black;
    box-shadow: 0 0 20px red;
}

/* pulse */
button.pulse {
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 5px red; }
    50% { box-shadow: 0 0 20px red; }
    100% { box-shadow: 0 0 5px red; }
}

button:active {
    transform: scale(0.95);
}

/* status */
#status {
    margin-top: 10px;
    opacity: 0;
    transition: 0.5s;
}
</style>
</head>

<body>

<div class="header">
    <h3>BCM Taxi</h3>
    <div class="logout" onclick="logout()">Sair</div>
</div>

<div id="map"></div>

<div class="container">
    <input type="text" placeholder="Pesquisar motorista por ID">
    <button onclick="buscarMotorista()">Agendar Viagem</button>
    <div id="status">Aguardando GPS...</div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map;

/* mapa */
function initMap(lat, lng) {
    document.getElementById("status").innerText = "📍 Localização detectada";

    map = L.map('map').setView([lat, lng], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19
    }).addTo(map);

    L.marker([lat, lng]).addTo(map)
        .bindPopup("Você está aqui")
        .openPopup();
}

/* erro gps */
function erroGPS(e) {
    console.log(e);
    document.getElementById("status").innerText = "❌ Erro ao obter GPS (usando fallback)";

    // Luanda fallback
    initMap(-8.8383, 13.2344);
}

/* pegar localização */
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                initMap(pos.coords.latitude, pos.coords.longitude);
            },
            erroGPS,
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    } else {
        erroGPS();
    }
}

/* simulação */
function buscarMotorista() {
    let status = document.getElementById("status");
    let btn = document.querySelector("button");

    btn.classList.add("pulse");

    status.style.opacity = 1;
    status.innerText = "🔍 Procurando motorista...";

    setTimeout(() => {
        status.innerText = "📡 Localizando motoristas próximos...";
    }, 2000);

    setTimeout(() => {
        status.innerText = "🚕 Motorista encontrado! Chegando em 5 minutos.";
        btn.classList.remove("pulse");
    }, 4000);
}

/* sair */
function logout() {
    window.location.href = "index.html";
}

/* animação ao carregar */
window.onload = () => {
    getLocation();

    document.body.style.opacity = 0;
    setTimeout(() => {
        document.body.style.transition = "1s";
        document.body.style.opacity = 1;
    }, 100);
};
</script>

</body>
</html>
