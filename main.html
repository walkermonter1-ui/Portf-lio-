<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>BCM Taxi</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #000000, #1a0000);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* APP CONTAINER (estilo celular) */
.app {
    width: 360px;
    height: 640px;
    background: #0b0b0b;
    border-radius: 25px;
    box-shadow: 0 0 30px red;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 15px;
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.8);
    color: red;
}

/* MAPA PEQUENO */
#map {
    height: 150px;
    margin: 10px;
    border-radius: 10px;
    overflow: hidden;
}

/* CONTEUDO */
.content {
    padding: 10px;
    flex: 1;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    background: black;
    border: 1px solid red;
    color: red;
    border-radius: 5px;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: linear-gradient(45deg, red, darkred);
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px red;
}

/* STATUS */
#status {
    margin-top: 10px;
    font-size: 14px;
}

/* ANÚNCIO */
.ad {
    background: linear-gradient(45deg, #111, #220000);
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    text-align: center;
    font-size: 13px;
    color: #aaa;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 5px red; }
    to { box-shadow: 0 0 15px red; }
}

/* FOOTER */
.footer {
    display: flex;
    justify-content: space-around;
    padding: 10px;
    background: #111;
    color: red;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <span>BCM Taxi</span>
        <span onclick="logout()" style="cursor:pointer;">Sair</span>
    </div>

    <div id="map"></div>

    <div class="content">
        <input type="text" placeholder="Pesquisar motorista por ID">
        <button onclick="buscarMotorista()">Agendar Viagem</button>

        <div id="status">Aguardando GPS...</div>

        <div class="ad" id="adBox">
            🔥 Promoção: 20% OFF na primeira viagem!
        </div>
    </div>

    <div class="footer">
        <span>🏠 Início</span>
        <span>🚕 Viagens</span>
        <span>⚙️ Conta</span>
    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map;

/* MAPA */
function initMap(lat, lng) {
    map = L.map('map').setView([lat, lng], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    L.marker([lat, lng]).addTo(map)
        .bindPopup("Você está aqui")
        .openPopup();

    document.getElementById("status").innerText = "📍 Localização ativa";
}

/* GPS */
function getLocation() {
    navigator.geolocation.getCurrentPosition(
        (pos) => initMap(pos.coords.latitude, pos.coords.longitude),
        () => initMap(-8.8383, 13.2344)
    );
}

/* SIMULAÇÃO */
function buscarMotorista() {
    let status = document.getElementById("status");

    status.innerText = "🔍 Procurando motorista...";

    setTimeout(() => {
        status.innerText = "🚕 Motorista encontrado!";
    }, 3000);
}

/* ANÚNCIOS DINÂMICOS */
let ads = [
    "🔥 Promoção: 20% OFF na primeira viagem!",
    "🚕 Convide amigos e ganhe saldo!",
    "💰 Ganhe bônus indicando motoristas!",
    "⚡ Viagens mais rápidas com BCM Taxi!"
];

setInterval(() => {
    let adBox = document.getElementById("adBox");
    adBox.innerText = ads[Math.floor(Math.random() * ads.length)];
}, 4000);

/* LOGOUT */
function logout() {
    window.location.href = "index.html";
}

/* START */
getLocation();
</script>

</body>
</html>
